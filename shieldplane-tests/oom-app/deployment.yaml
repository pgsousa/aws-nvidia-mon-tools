apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-loop
  namespace: app-tests
  labels:
    app: oom-loop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-loop
  template:
    metadata:
      labels:
        app: oom-loop
    spec:
      containers:
        - name: allocator
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              import time
              blocks = [bytearray(1024 * 1024) for _ in range(80)]
              while True:
                  time.sleep(60)
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
