apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo-evidence
  namespace: app-tests-115-evidence
  labels:
    app: oom-demo-evidence
  annotations:
    argocd.argoproj.io/tracking-id: oom-demo-115-evidence:apps/Deployment:app-tests-115-evidence/oom-demo-evidence
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: oom-demo-evidence
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: oom-demo-evidence
    spec:
      containers:
      - args:
        - "import time\nblob = bytearray(40 * 1024 * 1024)\nwhile True:\n    time.sleep(60)\n"
        command:
        - python
        - -c
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        name: eater
        resources:
          limits:
            cpu: 100m
            memory: 32Mi
          requests:
            cpu: 10m
            memory: 16Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        - name: eater
          resources:
            limits:
              memory: "64Mi"
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
