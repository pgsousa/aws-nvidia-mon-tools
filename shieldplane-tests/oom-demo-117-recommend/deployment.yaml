apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo-recommend
  namespace: app-tests-117-recommend
  labels:
    app: oom-demo-recommend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo-recommend
  template:
    metadata:
      labels:
        app: oom-demo-recommend
    spec:
      containers:
        - name: eater
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              import time
              blob = bytearray(40 * 1024 * 1024)
              while True:
                  time.sleep(60)
          resources:
            requests:
              memory: "32Mi"
              cpu: 10m
            limits:
              memory: "64Mi"
              cpu: 100m

