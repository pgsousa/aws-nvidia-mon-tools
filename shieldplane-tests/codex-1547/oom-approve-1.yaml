apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-approve-1
  namespace: app-tests
  labels:
    app: oom-approve-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-approve-1
  template:
    metadata:
      labels:
        app: oom-approve-1
    spec:
      containers:
        - name: eater
          image: python:3.11-slim
          command:
            - python
            - -c
          args:
            - |
              import time
              blob = bytearray(40 * 1024 * 1024)
              print("allocated", len(blob), flush=True)
              while True:
                  time.sleep(60)
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 100m
