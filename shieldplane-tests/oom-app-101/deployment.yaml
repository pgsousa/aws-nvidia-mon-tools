apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-loop
  namespace: app-tests-101
  labels:
    app.kubernetes.io/name: oom-loop
    app.kubernetes.io/part-of: shieldplane-oom-101
    shieldplane-test: oom-101
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oom-loop
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oom-loop
        app.kubernetes.io/part-of: shieldplane-oom-101
        shieldplane-test: oom-101
    spec:
      containers:
        - name: allocator
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import time
              blocks = [bytearray(1024 * 1024) for _ in range(80)]
              while True:
                  time.sleep(60)
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
