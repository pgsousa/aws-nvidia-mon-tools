apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oom-demo-117-recommend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pgsousa/aws-nvidia-mon-tools.git
    targetRevision: main
    path: shieldplane-tests/oom-demo-117-recommend
  destination:
    server: https://kubernetes.default.svc
    namespace: app-tests-117-recommend
  syncPolicy:
    automated:
      prune: true
      selfHeal: false

